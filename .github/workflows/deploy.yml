name: Deploy to AWS

on:
  push:
    branches:
      - main
  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

# These permissions are required by AWS OIDC to obtain temporary credentials
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # This automatically caches ~/.npm directory, optimizing dependency installation
          cache: 'npm' 

      - name: Install Dependencies
        # npm ci is preferred in CI environments as it strictly installs from package-lock.json
        run: npm ci

      # Optional step: Create .env from GitHub Secrets
      # You can comment this out or modify based on how you load env variables in Vite
      - name: Setup Environment Variables
        run: |
          echo "VITE_API_URL=https://api.paduy.tech/api" >> .env

      - name: Build Project
        # Vite will build output into the "dist" directory by default
        run: npm run build

      - name: Configure AWS Credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::832950311791:role/skinnavi-frontend-deploy-role
          aws-region: us-west-2

      - name: Sync Files to S3 Bucket
        # The --delete flag ensures files removed from the repository are also removed from S3
        run: aws s3 sync dist s3://static-bucket-group-15 --delete

      - name: Invalidate CloudFront Cache
        # Forces CloudFront to fetch the latest files from S3 rather than serving older cached versions
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E325G04IFOOUTC \
            --paths "/*"
