name: Deploy to Render

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  deploy_development:
    name: Deploy Development (dev)
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'dev'
    runs-on: ubuntu-latest
    environment: development
    concurrency:
      group: render-development
      cancel-in-progress: true

    steps:
      - name: Trigger Render development deploy hook
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL_DEV"
        env:
          RENDER_DEPLOY_HOOK_URL_DEV: ${{ secrets.RENDER_DEPLOY_HOOK_URL_DEV }}

  deploy_production:
    name: Deploy Production (main)
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: render-production
      cancel-in-progress: true

    steps:
      - name: Trigger Render production deploy hook
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL_PROD"
        env:
          RENDER_DEPLOY_HOOK_URL_PROD: ${{ secrets.RENDER_DEPLOY_HOOK_URL_PROD }}